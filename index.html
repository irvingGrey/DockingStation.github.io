<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docking Station | Project Dashboard</title>
    <style>
        /* CSS Variables for easy maintenance */
        :root {
            --bg-color: #000000;
            --emerald-green: #50C878;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--emerald-green);
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            border-bottom: 2px solid var(--emerald-green);
            padding-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Docking Station</h1>
        <p>Research Project Management Repository</p>

</html>
