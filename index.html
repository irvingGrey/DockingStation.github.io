<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Docking Station</title>
    <style>
        :root {
            --bg-color: #000000;
            --emerald: #50C878;
            --emerald-dim: rgba(80, 200, 120, 0.1);
            --border-style: 1px solid #50C878;
            --font-stack: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius-main: 10px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--emerald);
            font-family: var(--font-stack);
            margin: 0;
            padding-top: 80px; /* Space for the fixed nav */
        }

        /* --- Navigation Bar --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--bg-color);
            border-bottom: var(--border-style);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            z-index: 1000;
        }

        .nav-link {
            color: var(--emerald);
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .nav-link:hover {
            opacity: 0.7;
        }

        /* --- Header & Layout --- */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- Cards --- */
        .card {
            border: var(--border-style);
            padding: 25px;
            border-radius: var(--radius-main);
            transition: all 0.3s ease;
        }

        .card:hover {
            background-color: var(--emerald-dim);
            box-shadow: 0 4px 15px rgba(80, 200, 120, 0.2);
        }

        .card h2 {
            margin-top: 0;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--emerald-dim);
            padding-bottom: 10px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 15px 0;
        }

        .card a {
            color: var(--emerald);
            text-decoration: none;
            font-weight: 500;
        }

        .card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav>
        <a href="admin.html" class="nav-link">Admin</a>
        <a href="research.html" class="nav-link">Research Hub</a>
        <a href="ai-workflows.html" class="nav-link">AI Workflows</a>
        <a href="about.html" class="nav-link">About</a>
    </nav>

    <header>
        <h1>DOCKING STATION :: RESEARCH MANAGEMENT</h1>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <h2>University Admin</h2>
            <ul>
                <li><a href="admin.html">A</a></li>
                <li><a href="admin.html">B)</a></li>
            </ul>
        </div>

        <div class="card">
            <h2>Research Hub</h2>
            <ul>
                <li><a href="research.html">A</a></li>
                <li><a href="research.html">B</a></li>
            </ul>
        </div>

        <div class="card">
            <h2>AI Workflows</h2>
            <ul>
                <li><a href="ai-workflows.html">A</a></li>
                <li><a href="ai-workflows.html">B</a></li>
            </ul>
        </div>
    </div>

</body>
</html>
